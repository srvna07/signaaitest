version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: signa_ai_postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signa_password}
      POSTGRES_DB: ${POSTGRES_DB:-signa_ai_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-signa_user} -d ${POSTGRES_DB:-signa_ai_db}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
